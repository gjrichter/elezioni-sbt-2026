<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Variazione partiti comparabili 2021→2026 – SBdT</title>
  <script src="https://cdn.jsdelivr.net/gh/gjrichter/ixmaps-flat@master/ixmaps.js"></script>
  <script src="https://d3js.org/d3.v3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/gjrichter/ixmaps-flat@master/usercharts/d3/arrow_chart.js"></script>
  <style>
    html, body {
      width: 100%; height: 100%; margin: 0; overflow: hidden;
      font-family: sans-serif; display: flex; flex-direction: column;
    }

    /* ── CONTROLS BAR ── */
    #controls {
      flex-shrink: 0;
      background: #1a2030;
      color: #fff;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    #controls h2 {
      font-size: 0.88rem;
      font-weight: 700;
      margin: 0;
      white-space: nowrap;
      opacity: 0.9;
    }
    .badge {
      font-size: 0.80rem; font-weight: 700;
      padding: 4px 12px; border-radius: 20px; white-space: nowrap;
    }
    .badge-cs { background: rgba(231,76,60,0.25);  color: #e74c3c; }
    .badge-cd { background: rgba(41,128,185,0.25); color: #5dade2; }
    #legend-note {
      font-size: 0.72rem; opacity: 0.42; white-space: nowrap; margin-left: auto;
    }

    @media (max-width: 540px) {
      #controls { flex-direction: column; align-items: stretch; padding: 8px 10px; gap: 6px; }
      #legend-note { display: none; }
    }

    /* ── MAP ── */
    #map-wrapper { flex: 1; position: relative; overflow: hidden; }
    #map { width: 100%; height: 100%; }

    #app-loading {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.92);
      padding: 1em 2.5em; border-radius: 8px;
      font-size: 1em; z-index: 9999;
      display: flex; align-items: center; gap: 10px;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #ccc; border-top-color: #2980b9;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="controls">
  <h2>Variazione partiti comparabili 2021 → 2026</h2>
  <span id="badge-cs" class="badge badge-cs"></span>
  <span id="badge-cd" class="badge badge-cd"></span>
  <span id="legend-note">
    ↖ rosso = Sinistra (PD+M5S+AVS+CambiaSBT) &nbsp;·&nbsp; ↗ blu = CDX (FdI+Lega+FI+CCP)
    &nbsp;·&nbsp; ▲ guadagno &nbsp;·&nbsp; ▼ perdita &nbsp;·&nbsp; % su totale voti lista
  </span>
</div>

<div id="map-wrapper">
  <div id="app-loading">
    <div class="spinner"></div>
    Caricamento dati 2021–2026…
  </div>
  <div id="map"></div>
</div>

<script>

// ── WRAPPER arrowChart CON ROTAZIONE ─────────────────────────────────────────
// Crea un <g rotate(angle)> figlio dentro args.target, vi reindirizza il draw
// standard di arrowChart, poi ripristina il target originale.
window.ixmaps = window.ixmaps || {};

function makeRotatedArrowChart(angle) {
  return function(SVGDocument, args) {
    var origTarget = args.target;
    var rotG = d3.select(origTarget)
                 .append("g")
                 .attr("transform", "rotate(" + angle + ")")
                 .node();
    args.target = rotG;
    var result = ixmaps.arrowChart(SVGDocument, args);
    args.target = origTarget;
    return result;
  };
}
ixmaps.arrowChartLeft_init  = function(SVGDocument, args) {
  if (typeof ixmaps.arrowChart_init === "function") ixmaps.arrowChart_init(SVGDocument, args);
};
ixmaps.arrowChartRight_init = function(SVGDocument, args) {
  if (typeof ixmaps.arrowChart_init === "function") ixmaps.arrowChart_init(SVGDocument, args);
};
ixmaps.arrowChartLeft  = makeRotatedArrowChart(-15);
ixmaps.arrowChartRight = makeRotatedArrowChart(+15);

// ── PARTITI COMPARABILI (presenti in ENTRAMBE le elezioni) ───────────────────
// Sinistra: PD, M5S, AVS/Europa Verde, Cambia SBT
var CS_COPPIE = [
  { n21:  8, n26:  4, nome: "PD"         },
  { n21: 19, n26:  3, nome: "M5S"        },
  { n21:  9, n26:  1, nome: "AVS/Verdi"  },
  { n21: 18, n26:  2, nome: "Cambia SBT" }
];
// Centrodestra: FdI, Lega, FI, CCP
var CD_COPPIE = [
  { n21: 17, n26: 12, nome: "FdI"   },
  { n21: 15, n26:  9, nome: "Lega"  },
  { n21: 16, n26: 11, nome: "FI"    },
  { n21:  1, n26: 13, nome: "CCP ★" }
];

var N_SEZ         = 43;
var MIN_VOTI_SEDE = 50;
var BASE21   = "https://raw.githubusercontent.com/gjrichter/elezioni-sbt-2021/main/data/sezioni/";
var BASE26   = "https://raw.githubusercontent.com/gjrichter/elezioni-sbt-2026/main/data/sezioni/";
var SEDI_URL = "https://raw.githubusercontent.com/gjrichter/elezioni-sbt-2026/main/data/sedi_sezioni_elettorali.geojson";

// ── STATO GLOBALE ─────────────────────────────────────────────────────────────
var sediGj   = null;
var lData21  = {};   // [sezione] = { [nlista]: voti, _total: N }
var lData26  = {};
var myMap    = null;

// ── CARICA LISTE PER SEZIONE ──────────────────────────────────────────────────
function loadListeSez(base, n) {
  var pad = String(n).padStart(3, "0");
  return fetch(base + pad + "/liste.json?_=" + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var arr = (d.voti || {}).arrVotiListe || {};
      var row = { _total: 0 };
      Object.keys(arr).forEach(function(nl) {
        var v = arr[nl].voti || 0;
        row[nl] = v;
        row._total += v;
      });
      return { sezione: n, data: row };
    })
    .catch(function() { return { sezione: n, data: { _total: 0 } }; });
}

// ── SOMMA VOTI PARTITI COMPARABILI ────────────────────────────────────────────
function sumCoppie(data, coppie, anno) {
  return coppie.reduce(function(s, c) {
    return s + (data[anno === 21 ? c.n21 : c.n26] || 0);
  }, 0);
}

// ── CALCOLA DELTA PER SEDE (un gruppo alla volta) ─────────────────────────────
// Denominatore = totale voti TUTTE le liste; Numeratore = partiti comparabili.
function computeSediGroup(coppie) {
  return sediGj.features.map(function(feat) {
    var p = feat.properties;
    var v21=0, T21=0, v26=0, T26=0;
    for (var s = p.sez_da; s <= p.sez_a; s++) {
      var d21 = lData21[s] || {};
      var d26 = lData26[s] || {};
      v21 += sumCoppie(d21, coppie, 21);
      T21 += d21._total || 0;
      v26 += sumCoppie(d26, coppie, 26);
      T26 += d26._total || 0;
    }
    if (T21 < MIN_VOTI_SEDE || T26 < MIN_VOTI_SEDE) return null;
    var pct21 = +(100 * v21 / T21).toFixed(1);
    var pct26 = +(100 * v26 / T26).toFixed(1);
    var delta = +(pct26 - pct21).toFixed(1);
    return {
      sez_da:    p.sez_da,
      nome:      p.nome,
      indirizzo: p.indirizzo,
      sezioni:   p.sezioni,
      pct21:     pct21,
      pct26:     pct26,
      delta:     delta
    };
  }).filter(function(d) { return d !== null; });
}

// ── AGGIORNA MAPPA ────────────────────────────────────────────────────────────
function updateMap() {
  var sediCS = computeSediGroup(CS_COPPIE);
  var sediCD = computeSediGroup(CD_COPPIE);

  // totali città
  var csV21=0, cdV21=0, T21=0, csV26=0, cdV26=0, T26=0;
  for (var s = 1; s <= N_SEZ; s++) {
    var d21 = lData21[s] || {};
    var d26 = lData26[s] || {};
    csV21 += sumCoppie(d21, CS_COPPIE, 21); T21 += d21._total || 0;
    csV26 += sumCoppie(d26, CS_COPPIE, 26); T26 += d26._total || 0;
    cdV21 += sumCoppie(d21, CD_COPPIE, 21);
    cdV26 += sumCoppie(d26, CD_COPPIE, 26);
  }
  var csDeltaCity = T21>0&&T26>0 ? +((100*csV26/T26)-(100*csV21/T21)).toFixed(1) : 0;
  var cdDeltaCity = T21>0&&T26>0 ? +((100*cdV26/T26)-(100*cdV21/T21)).toFixed(1) : 0;

  document.getElementById("badge-cs").textContent =
    "Sinistra: " + (csDeltaCity>=0?"+":"") + csDeltaCity + " pp  (" +
    (T21>0?(100*csV21/T21).toFixed(1):"—") + "% → " +
    (T26>0?(100*csV26/T26).toFixed(1):"—") + "%)";
  document.getElementById("badge-cd").textContent =
    "CDX: " + (cdDeltaCity>=0?"+":"") + cdDeltaCity + " pp  (" +
    (T21>0?(100*cdV21/T21).toFixed(1):"—") + "% → " +
    (T26>0?(100*cdV26/T26).toFixed(1):"—") + "%)";

  myMap.then(function(api) {
    try { api.removeTheme("cs_arrows"); } catch(e) {}
    try { api.removeTheme("cd_arrows"); } catch(e) {}

    // ── tema Sinistra (rosso) ─────────────────────────────────────────────────
    myMap.layer("sedi")
      .data({ obj: sediCS, type: "json" })
      .binding({ geo: "sez_da", value: "delta" })
      .type("CHART|USER|SIZE|VALUES|AGGREGATE")
      .style({
        userdraw:         "arrowChartLeft",
        colorscheme:      ["#c0392b", "#e74c3c"],   // neg=rosso scuro / pos=rosso
        rangecentervalue: 0,
        normalsizevalue:  5,
        fillopacity:      0.85,
        rangescale:       0.5,
        showdata:         "true",
        units:            " pp",
        valuedecimals:    1
      })
      .meta({
        name:    "cs_arrows",
        title:   "PD+M5S+AVS+CambiaSBT 2021→2026",
        tooltip: "<b>{{nome}}</b><br>{{indirizzo}}<br>Sezioni: {{sezioni}}<br>" +
                 "<span style='color:#e74c3c'>● Sinistra</span> (PD+M5S+AVS+CambiaSBT)<br>" +
                 "{{pct21}}% → {{pct26}}%  <b>{{delta}} pp</b>"
      })
      .define();

    // ── tema CDX (blu) ────────────────────────────────────────────────────────
    myMap.layer("sedi")
      .data({ obj: sediCD, type: "json" })
      .binding({ geo: "sez_da", value: "delta" })
      .type("CHART|USER|SIZE|VALUES|AGGREGATE")
      .style({
        userdraw:         "arrowChartRight",
        colorscheme:      ["#1a5276", "#2980b9"],   // neg=blu scuro / pos=blu
        rangecentervalue: 0,
        normalsizevalue:  5,
        fillopacity:      0.85,
        rangescale:       0.5,
        showdata:         "true",
        units:            " pp",
        valuedecimals:    1
      })
      .meta({
        name:    "cd_arrows",
        title:   "CDX 2021→2026",
        tooltip: "<b>{{nome}}</b><br>{{indirizzo}}<br>Sezioni: {{sezioni}}<br>" +
                 "<span style='color:#5dade2'>● CDX</span> (FdI+Lega+FI+CCP)<br>" +
                 "{{pct21}}% → {{pct26}}%  <b>{{delta}} pp</b>"
      })
      .define();
  });
}

// ── AVVIO ─────────────────────────────────────────────────────────────────────
var sezNums = Array.from({ length: N_SEZ }, function(_, i) { return i + 1; });

Promise.all([
  fetch(SEDI_URL + "?_=" + Date.now()).then(function(r) { return r.json(); }),
  Promise.all(sezNums.map(function(n) { return loadListeSez(BASE21, n); })),
  Promise.all(sezNums.map(function(n) { return loadListeSez(BASE26, n); }))
]).then(function(results) {
  sediGj = results[0];
  results[1].forEach(function(r) { lData21[r.sezione] = r.data; });
  results[2].forEach(function(r) { lData26[r.sezione] = r.data; });

  document.getElementById("app-loading").style.display = "none";

  myMap = ixmaps.Map("map", {
    mapType: "VT_TONER_LITE",
    mode:    "pan",
    legend:  "open",
    tools:   true
  })
  .view({ center: { lat: 42.930, lng: 13.887 }, zoom: 13 })
  .options({
    objectscaling:   "dynamic",
    normalSizeScale: "80000",
    basemapopacity:  0.55,
    flushChartDraw:  1000000
  });

  myMap.layer("sedi")
    .data({ obj: sediGj, type: "geojson" })
    .binding({ geo: "geometry", id: "sez_da", title: "nome" })
    .type("FEATURE|SILENT")
    .style({ colorscheme: ["none"], scale: 0, showdata: "true" })
    .define();

  updateMap();

}).catch(function(e) {
  document.getElementById("app-loading").innerHTML = "✗ Errore: " + e.message;
});

</script>
</body>
</html>
