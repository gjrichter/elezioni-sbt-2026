<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Affluenza per Sede – SBdT 2026</title>
  <script src="https://cdn.jsdelivr.net/gh/gjrichter/ixmaps-flat@master/ixmaps.js"></script>
  <style>
    html, body {
      width: 100%; height: 100%; margin: 0; overflow: hidden;
      font-family: sans-serif; display: flex; flex-direction: column;
    }

    /* ── CONTROLS BAR ── */
    #controls {
      flex-shrink: 0;
      background: #1a3028;
      color: #fff;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    #controls label {
      font-size: 0.78rem;
      font-weight: 600;
      opacity: 0.65;
      white-space: nowrap;
    }
    .ctrl-select {
      font-size: 0.85rem;
      padding: 5px 10px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      min-width: 260px;
    }
    .ctrl-select option { background: #1a3028; color: #fff; }
    #slot-info { font-size: 0.74rem; opacity: 0.55; white-space: nowrap; }

    /* ── MOBILE ── */
    @media (max-width: 540px) {
      #controls { flex-direction: column; align-items: stretch; padding: 8px 10px; gap: 6px; }
      #controls label { display: none; }
      .ctrl-select { font-size: 16px; width: 100%; min-width: 0; padding: 9px 10px; }
      #slot-info { display: none; }
    }

    /* ── MAP ── */
    #map-wrapper { flex: 1; position: relative; overflow: hidden; }
    #map { width: 100%; height: 100%; }

    /* Note: DO NOT use id="loading" or id="loading-div" — ixmaps reserves those */
    #app-loading {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.92);
      padding: 1em 2.5em; border-radius: 8px;
      font-size: 1em; z-index: 9999;
      display: flex; align-items: center; gap: 10px;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #ccc;
      border-top-color: #27ae60;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="controls">
  <label for="sel-slot">Rilevazione:</label>
  <select id="sel-slot" class="ctrl-select" onchange="onSlotChange()"></select>
  <span id="slot-info"></span>
</div>

<div id="map-wrapper">
  <div id="app-loading">
    <div class="spinner"></div>
    Caricamento affluenza…
  </div>
  <div id="map"></div>
</div>

<script>

var BASE      = "https://raw.githubusercontent.com/gjrichter/elezioni-sbt-2026/main/data/";
var SEDI_URL  = BASE + "sedi_sezioni_elettorali.geojson";

// ── STATO GLOBALE ─────────────────────────────────────────────────────────────
var sediGj        = null;
var affSlots      = [];    // da affluenza.json → slots[]
var affSezioni    = {};    // da affluenza_sezioni.json → sezioni[cdafflu][sez]

// ixmaps: NEVER name var "map" — conflicts with internals
var myMap         = null;
var ACTIVE_THEME  = null;

// ── AGGREGA PER SEDE ──────────────────────────────────────────────────────────
function computeSediData(cdafflu) {
  var cache = affSezioni[String(cdafflu)] || {};
  return sediGj.features.map(function(feat) {
    var p = feat.properties;
    var votanti = 0, iscritti = 0;
    for (var s = p.sez_da; s <= p.sez_a; s++) {
      var d = cache[String(s)] || {};
      votanti  += d.tvotanti    || 0;
      iscritti += d.iscri_totale || 0;
    }
    var pct = iscritti > 0 ? +(100 * votanti / iscritti).toFixed(1) : 0;
    return { sez_da: p.sez_da, nome: p.nome, indirizzo: p.indirizzo, sezioni: p.sezioni,
             tvotanti: votanti, iscri_totale: iscritti, pct: pct };
  });
}

// ── AGGIORNA OVERLAY ─────────────────────────────────────────────────────────
function updateMap(slot) {
  var sediData = computeSediData(slot.cdafflu);
  var tot      = slot.tvotanti || 0;
  var isc      = slot.iscri_totale || 0;
  var pctC     = isc > 0 ? (100 * tot / isc).toFixed(1).replace(".", ",") + "%" : "—";

  document.getElementById("slot-info").textContent =
    Number(tot).toLocaleString("it-IT") + " votanti  ·  " + pctC;

  var themeName = "afflu_" + slot.cdafflu;
  var prev      = ACTIVE_THEME;

  myMap.then(function(api) {
    if (prev) { try { api.removeTheme(prev); } catch(e) {} }

    myMap.layer("sedi")
      .data({ obj: sediData, type: "json" })
      .binding({ geo: "sez_da", value: "pct" })
      .type("CHART|PIE|AUTOCOMPLETE|SIZE|VALUES|AGGREGATE|MEAN")
      .style({
        colorscheme:     ["#00aa00"],
        fillopacity:     0.75,
        shadow:          false,
        visible:         true,
        showdata:        true,
        units:           "%",
        legendunits:     " votanti",
        refreshtimeout:  0,
        normalsizevalue: "958",
        scale:           1,
        sizepow:         2,
        sizefield:       "tvotanti",
        linecolor:       ["#008800"],
        textcolor:       "#008800",
        linewidth:       0.5,
        valuescale:      1,
        valuedecimals:   1
      })
      .meta({
        name:    themeName,
        title:   slot.anagrafica ? slot.anagrafica.descrizione : "Affluenza",
        tooltip: "<b>{{nome}}</b><br>{{indirizzo}}<br>" +
                 "Sezioni: {{sezioni}}<br>" +
                 "Votanti: <b>{{tvotanti}}</b> su {{iscri_totale}}<br>" +
                 "Affluenza: <b>{{pct}}%</b><br>{{theme.item.chart}}"
      })
      .define();

    ACTIVE_THEME = themeName;
  });
}

// ── HANDLER ───────────────────────────────────────────────────────────────────
function onSlotChange() {
  var idx = parseInt(document.getElementById("sel-slot").value, 10);
  updateMap(affSlots[idx]);
}

// ── AVVIO ─────────────────────────────────────────────────────────────────────
var cb = "?_=" + Date.now();
Promise.all([
  fetch(SEDI_URL        + cb).then(function(r) { return r.json(); }),
  fetch(BASE + "affluenza.json"         + cb).then(function(r) { return r.json(); }),
  fetch(BASE + "affluenza_sezioni.json" + cb).then(function(r) { return r.json(); })
]).then(function(results) {
  sediGj     = results[0];
  affSlots   = results[1].slots  || [];
  affSezioni = results[2].sezioni || {};

  if (affSlots.length === 0) {
    document.getElementById("app-loading").innerHTML = "Nessun dato di affluenza disponibile.";
    return;
  }

  // popola select
  var sel = document.getElementById("sel-slot");
  affSlots.forEach(function(s, i) {
    var opt  = document.createElement("option");
    opt.value = i;
    var isc  = s.iscri_totale || 0;
    var vot  = s.tvotanti     || 0;
    var pct  = isc > 0 ? "  (" + (100 * vot / isc).toFixed(1).replace(".", ",") + "%)" : "  (—)";
    var desc = s.anagrafica ? s.anagrafica.descrizione : ("Rilevazione " + s.cdafflu);
    opt.textContent  = desc + pct;
    if (vot === 0) opt.style.opacity = "0.5";
    sel.appendChild(opt);
  });

  document.getElementById("app-loading").style.display = "none";

  // crea la mappa UNA SOLA VOLTA
  myMap = ixmaps.Map("map", {
    mapType: "VT_TONER_LITE",
    mode:    "pan",
    legend:  "open",
    tools:   true
  })
  .view({ center: { lat: 42.930, lng: 13.887 }, zoom: 13 })
  .options({
    objectscaling:   "dynamic",
    normalSizeScale: "80000",
    basemapopacity:  0.55,
    flushChartDraw:  1000000
  });

  // layer base FEATURE – invisibile, solo geometria di riferimento
  myMap.layer("sedi")
    .data({ obj: sediGj, type: "geojson" })
    .binding({ geo: "geometry", id: "sez_da", title: "nome" })
    .type("FEATURE|SILENT")
    .style({ colorscheme: ["none"], scale: 0, showdata: "true" })
    .define();

  // mostra il primo slot con dati reali (tvotanti > 0), altrimenti il primo
  var defaultIdx = 0;
  for (var i = 0; i < affSlots.length; i++) {
    if ((affSlots[i].tvotanti || 0) > 0) { defaultIdx = i; break; }
  }
  sel.value = defaultIdx;
  updateMap(affSlots[defaultIdx]);

}).catch(function(e) {
  document.getElementById("app-loading").innerHTML = "✗ Errore: " + e.message;
});

</script>
</body>
</html>
