<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Voti per Candidato e Sede – SBdT 2026</title>
  <script src="https://cdn.jsdelivr.net/gh/gjrichter/ixmaps-flat@master/ixmaps.js"></script>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; font-family: sans-serif; }
    #map { width: 100%; height: 100%; }
  </style>
</head>
<body>
<div id="map"></div>
<script>

var RAW = "https://raw.githubusercontent.com/gjrichter/elezioni-sbt-2026/main/data/sedi_risultati.geojson";

// Fede=rosso, D'Andrea=giallo, Mozzoni=blu
var COLORS = ["#e74c3c", "#f1c40f", "#2980b9"];

fetch(RAW)
  .then(function(r) { return r.json(); })
  .then(function(gj) {

    // normalsizevalue = valore che corrisponde alla dimensione "normale"
    // lo settiamo al totale voti atteso per sede (~ 1000), aggiornabile post-scrutinio
    var maxVoti = Math.max.apply(null,
      gj.features.map(function(f) { return f.properties.tot_voti || 1; })
    );

    var myMap = ixmaps.Map("map", {
      mapType: "VT_TONER_LITE",
      mode:    "info",
      legend:  "open",
      tools:   true
    })
    .view({ center: { lat: 42.930, lng: 13.887 }, zoom: 13 })
    .options({
      objectscaling:   "dynamic",
      normalSizeScale: "80000",
      basemapopacity:  0.55,
      flushChartDraw:  1000000
    });

    myMap.layer("voti")
      .data({ obj: gj, type: "geojson" })
      .binding({
        geo:   "geometry",
        value: "voti_1|voti_2|voti_3",
        title: "nome"
      })
      .type("CHART|BAR|STACKED|SIZE|GRID|BOX|VALUES")
      .style({
        colorscheme:     COLORS,
        normalsizevalue: String(Math.max(maxVoti, 1000)),
        scale:           1,
        fillopacity:     0.88,
        gridx:           3,
        showdata:        "true"
      })
      .meta({
        name:    "voti-theme",
        tooltip: "<b>{{nome}}</b><br>{{indirizzo}}<br>" +
                 "Sezioni: {{sezioni}}<br><br>" +
                 "Fede: <b>{{voti_1}}</b> voti<br>" +
                 "D'Andrea: <b>{{voti_2}}</b> voti<br>" +
                 "Mozzoni: <b>{{voti_3}}</b> voti<br>" +
                 "Totale: <b>{{tot_voti}}</b>"
      })
      .title("Voti per candidato")
      .define();

  });

</script>
</body>
</html>
